# Home Assistant Configuration Example
# Bu dosyayı Home Assistant'ın configuration.yaml dosyasına ekleyin.

input_select:
  tarama_profili:
    name: Tarama Profili
    options:
      - "1: Otomatik (Önizleme + Akıllı Kırpma)"
      - "2: Özel Ölçü (Aşağıdan Girin)"
    initial: "1: Otomatik (Önizleme + Akıllı Kırpma)"
    icon: mdi:crop

  tarama_dpi:
    name: Tarama Çözünürlüğü (DPI)
    options:
      - "300"
      - "600"
      - "1200"
    initial: "1200"
    icon: mdi:quality-high

input_number:
  tarama_ozel_x:
    name: Özel Genişlik (X) mm
    min: 10
    max: 215
    step: 1
    initial: 215
    icon: mdi:arrow-left-right
    mode: box

  tarama_ozel_y:
    name: Özel Yükseklik (Y) mm
    min: 10
    max: 297
    step: 1
    initial: 297
    icon: mdi:arrow-up-down
    mode: box

command_line:
  - sensor:
      name: Tarayıcı Durumu
      unique_id: tarayici_durumu
      # lsusb ile HP yazıcı bağlı mı kontrol eder. Bağlıysa durumu okur, değilse "Kapalı" yazar.
      command: "ssh -i /config/ssh_key -o StrictHostKeyChecking=no -q kullanici_adi@sunucu_adresi \"if lsusb | grep -iq 'Hewlett-Packard\\|HP'; then cat /home/{kullanici_adi}/scan_status.txt 2>/dev/null || echo '🟢 Hazır'; else echo '📴 Kapalı'; fi\""
      scan_interval: 2 # 2 saniyede bir durumu günceller

shell_command:
  # ---------------------------------------------------------
  # SADECE TARAMA (1200 DPI - RAW TIFF)
  # ---------------------------------------------------------
  # Sunucu sadece veriyi diske yazar, işlem yapmaz.
  # "nohup ... &" kullandık ki HA tarama bitene kadar donmasın (2-3 dk sürebilir).

  tara_ham: >
    ssh -i /config/ssh_key -o StrictHostKeyChecking=no {kullanici_adi}@{sunucu_adresi} \
    "nohup bash /home/{kullanici_adi}/scan.sh {{ states('input_select.tarama_profili').split(':')[0] }} {{ states('input_select.tarama_dpi') }} {{ states('input_number.tarama_ozel_x') | int }} {{ states('input_number.tarama_ozel_y') | int }} > /dev/null 2>&1 &"